query getAllClasses {
  allCourses {
    _id
    id
    name
    courseCode
    term {
      _id
      name
    }
  }
}

query getClass($classId: ID!) {
  course(id: $classId) {
    _id
    courseCode
    id
    assetString
    createdAt
    syllabusBody
    name
    assignmentsConnection {
      nodes {
        _id
        id
        htmlUrl
        description
        dueAt
      }
    }
  }
}

query getClassAssignments($classId: ID!) {
  course(id: $classId) {
    assignmentsConnection {
      nodes {
        _id
        id
        htmlUrl
        dueAt
        state
        name
        submissionsConnection {
          nodes {
            attempt
            readState
            score
            gradingStatus
          }
        }
        pointsPossible
      }
    }
  }
}

query getAssignment($assignmentId: ID!) {
  assignment(id: $assignmentId) {
    submissionsConnection {
      nodes {
        attempt
        readState
        score
        gradingStatus
      }
    }
    course {
      id
      name
    }
    id
    pointsPossible
    name
    state
    dueAt
    htmlUrl
  }
}

query getAssignmentDetail($assignmentId: ID!) {
  assignment(id: $assignmentId) {
    course {
      id
      name
    }
    description
    dueAt
    htmlUrl
    id
    pointsPossible
    name
    submissionTypes
    allowedExtensions
    submissionsConnection {
      nodes {
        id
        attempt
        readState
        score
        gradingStatus
        createdAt
      }
    }
  }
}
